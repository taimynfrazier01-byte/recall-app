<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recall | Personal Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-900 h-screen flex flex-col font-sans text-slate-100 overflow-hidden">

    <header class="bg-slate-800/50 backdrop-blur-lg border-b border-slate-700 p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">Recall</h1>
        <div id="statusIndicator"
            class="text-[9px] bg-slate-700 px-2 py-1 rounded-full uppercase tracking-widest text-slate-400 font-bold border border-slate-600">
            Connecting...
        </div>
    </header>

    <main id="timeline" class="flex-1 overflow-y-auto p-4 space-y-6 max-w-2xl mx-auto w-full pb-24"></main>

    <footer class="bg-slate-800 border-t border-slate-700 p-4 fixed bottom-0 left-0 right-0">
        <div class="max-w-2xl mx-auto flex items-end gap-3">
            <input type="file" id="imageInput" accept="image/*" class="hidden">
            <button onclick="document.getElementById('imageInput').click()"
                class="p-3 bg-slate-700 rounded-xl text-slate-300 active:scale-95">
                <i data-lucide="camera" class="w-6 h-6"></i>
            </button>
            <div class="flex-1 bg-slate-900 rounded-2xl p-1 border border-slate-700">
                <textarea id="messageInput" rows="1" placeholder="Log a memory..."
                    class="w-full bg-transparent border-none focus:ring-0 p-3 text-sm text-white resize-none"></textarea>
            </div>
            <button onclick="addEntry()" class="bg-blue-600 text-white p-3 rounded-xl shadow-lg active:scale-90">
                <i data-lucide="send" class="w-6 h-6"></i>
            </button>
        </div>
    </footer>

    <script>
        const SB_URL = 'https://kvpvjlyhijpjcqpqrvin.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2cHZqbHloaXlwamNwcXBydmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjMzMzQsImV4cCI6MjA5MTU5OTMzNH0.qbUNlIhiZ2I8EwN0eBWeLGFwq5GoQHQ1JelntLkNNM0';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // Match the exact table name with double quotes for SQL safety
        const TABLE_NAME = '"Recall-App"';

        lucide.createIcons();
        const timeline = document.getElementById('timeline');
        const messageInput = document.getElementById('messageInput');
        const status = document.getElementById('statusIndicator');

        async function init() {
            const { error } = await _supabase.from(TABLE_NAME).select('id').limit(1);
            if (error) {
                status.innerText = "Offline";
                status.className = "text-[9px] bg-red-900/30 px-2 py-1 rounded-full uppercase text-red-400 font-bold border border-red-800";
            } else {
                status.innerText = "Live";
                status.className = "text-[9px] bg-green-900/30 px-2 py-1 rounded-full uppercase text-green-400 font-bold border border-green-800";
                loadTimeline();
            }
        }

        async function loadTimeline() {
            const { data } = await _supabase.from(TABLE_NAME).select('*').order('created_at', { ascending: true });
            if (data) {
                timeline.innerHTML = '';
                data.forEach(msg => render(msg.content, msg.image_url, msg.created_at));
            }
        }

        async function addEntry() {
            const text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = '';
            const { error } = await _supabase.from(TABLE_NAME).insert([{ content: text }]);
            if (!error) render(text, null, new Date());
        }

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fileName = `${Date.now()}-${file.name.replace(/\s/g, '_')}`;
            const { data, error: upErr } = await _supabase.storage.from('recall-photos').upload(fileName, file);
            if (!upErr) {
                const { data: urlData } = _supabase.storage.from('recall-photos').getPublicUrl(fileName);
                await _supabase.from(TABLE_NAME).insert([{ content: "Photo Log", image_url: urlData.publicUrl }]);
                render("Photo Log", urlData.publicUrl, new Date());
            }
        });

        function render(text, img, time) {
            const html = `
                <div class="flex flex-col items-end space-y-2">
                    <div class="bg-blue-600 p-4 rounded-2xl rounded-br-none shadow-lg max-w-[85%] border border-blue-500">
                        ${img ? `<img src="${img}" class="rounded-xl mb-3 w-full object-cover">` : ''}
                        <p class="text-[15px] font-medium leading-relaxed">${text}</p>
                    </div>
                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-tight">${new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                </div>`;
            timeline.insertAdjacentHTML('beforeend', html);
            timeline.scrollTo({ top: timeline.scrollHeight, behavior: 'smooth' });
        }
        init();
    </script>
</body>

</html>
