<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recall | Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .bubble-inbound {
            border-bottom-left-radius: 4px;
        }
    </style>
</head>

<body id="mainBody" class="bg-slate-900 h-screen flex flex-col font-sans text-white">

    <header class="bg-slate-800/80 backdrop-blur-md sticky top-0 z-10 border-b border-slate-700 p-4">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold text-blue-400">Recall</h1>
            <div id="statusIndicator"
                class="text-[10px] bg-slate-700 px-2 py-1 rounded-full uppercase tracking-widest text-slate-400">
                Syncing...</div>
        </div>
    </header>

    <main id="timeline" class="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar max-w-2xl mx-auto w-full">
    </main>

    <footer class="bg-slate-800 border-t border-slate-700 p-4 pb-8 md:pb-4">
        <div class="max-w-2xl mx-auto flex items-end gap-2">
            <input type="file" id="imageInput" accept="image/*" class="hidden">
            <button onclick="document.getElementById('imageInput').click()"
                class="p-2 text-slate-400 hover:bg-slate-700 rounded-full">
                <i data-lucide="camera" class="w-6 h-6"></i>
            </button>
            <div class="flex-1 bg-slate-700 rounded-2xl p-1 border border-slate-600">
                <textarea id="messageInput" rows="1" placeholder="Log a memory..."
                    class="w-full bg-transparent border-none focus:ring-0 p-2 text-sm text-white resize-none"></textarea>
            </div>
            <button onclick="addEntry()"
                class="bg-blue-600 hover:bg-blue-500 text-white p-2 rounded-full shadow-lg active:scale-95 transition-transform">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </div>
    </footer>

    <script>
        const SB_URL = 'https://kvpvjlyhijpjcqpqrvin.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2cHZqbHloaXlwamNwcXBydmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjMzMzQsImV4cCI6MjA5MTU5OTMzNH0.qbUNlIhiZ2I8EwN0eBWeLGFwq5GoQHQ1JelntLkNNM0';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // Critical: Wrapping table name in quotes to handle the hyphen
        const TABLE_NAME = '"Recall-App"';

        lucide.createIcons();
        const timeline = document.getElementById('timeline');
        const messageInput = document.getElementById('messageInput');
        const status = document.getElementById('statusIndicator');

        async function init() {
            const { error } = await _supabase.from(TABLE_NAME).select('count', { count: 'planned', head: true });
            if (error) {
                status.innerText = "Offline";
                status.className = "text-[10px] bg-red-900/50 px-2 py-1 rounded-full uppercase text-red-400";
            } else {
                status.innerText = "Connected";
                status.className = "text-[10px] bg-green-900/50 px-2 py-1 rounded-full uppercase text-green-400";
                loadTimeline();
            }
        }

        async function loadTimeline() {
            const { data } = await _supabase.from(TABLE_NAME).select('*').order('created_at', { ascending: true });
            if (data) {
                timeline.innerHTML = '';
                data.forEach(msg => render(msg.content, msg.image_url, msg.created_at));
            }
        }

        async function addEntry() {
            const text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = '';

            const { error } = await _supabase.from(TABLE_NAME).insert([{ content: text }]);
            if (!error) render(text, null, new Date());
            else console.error("DB Error:", error.message);
        }

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const fileName = `${Date.now()}-${file.name}`;
            const { error: upErr } = await _supabase.storage.from('recall-photos').upload(fileName, file);

            if (upErr) return alert("Upload Error: " + upErr.message);

            const { data: urlData } = _supabase.storage.from('recall-photos').getPublicUrl(fileName);
            await _supabase.from(TABLE_NAME).insert([{ content: "Photo Log", image_url: urlData.publicUrl }]);
            render("Photo Log", urlData.publicUrl, new Date());
        });

        function render(text, img, time) {
            const entryHTML = `
                <div class="flex flex-col items-end space-y-1">
                    <div class="bg-blue-600 p-3 rounded-2xl bubble-inbound shadow-lg max-w-[85%]">
                        ${img ? `<img src="${img}" class="rounded-lg mb-2 border border-blue-400">` : ''}
                        <p class="text-sm font-medium leading-relaxed">${text}</p>
                    </div>
                    <span class="text-[9px] text-slate-500 font-bold mr-1 uppercase">${new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                </div>`;
            timeline.insertAdjacentHTML('beforeend', entryHTML);
            timeline.scrollTo({ top: timeline.scrollHeight, behavior: 'smooth' });
        }

        init();
    </script>
</body>

</html>
