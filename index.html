<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recall | Final Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-900 h-screen flex flex-col font-sans text-white">

    <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur">
        <h1 class="text-xl font-bold text-blue-500">Recall</h1>
        <div id="status"
            class="text-[10px] bg-slate-800 px-3 py-1 rounded-full uppercase font-bold tracking-widest text-slate-500">
            Initializing...</div>
    </header>

    <main id="timeline" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
    </main>

    <footer class="p-4 bg-slate-800 border-t border-slate-700">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input type="file" id="imageInput" accept="image/*" class="hidden">
            <button onclick="document.getElementById('imageInput').click()"
                class="p-3 bg-slate-700 rounded-xl text-slate-400">
                <i data-lucide="camera"></i>
            </button>
            <input type="text" id="msg" placeholder="Log memory..."
                class="flex-1 bg-slate-900 border-none rounded-xl px-4 py-2 text-white focus:ring-2 focus:ring-blue-500">
            <button onclick="add()" class="bg-blue-600 px-5 py-2 rounded-xl font-bold">Send</button>
        </div>
    </footer>

    <script>
        const SB_URL = 'https://kvpvjlyhijpjcqpqrvin.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2cHZqbHloaXlwamNwcXBydmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjMzMzQsImV4cCI6MjA5MTU5OTMzNH0.qbUNlIhiZ2I8EwN0eBWeLGFwq5GoQHQ1JelntLkNNM0';
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        // Matches your exact table name from image_8f9410.jpg
        const TABLE = '"Recall-App"';

        lucide.createIcons();

        async function init() {
            const { error } = await _sb.from(TABLE).select('id').limit(1);
            const badge = document.getElementById('status');
            if (error) {
                badge.innerText = "Error: " + error.message;
                badge.className = "text-[10px] bg-red-900/30 px-3 py-1 rounded-full uppercase font-bold text-red-400";
            } else {
                badge.innerText = "Live";
                badge.className = "text-[10px] bg-green-900/30 px-3 py-1 rounded-full uppercase font-bold text-green-400";
                load();
            }
        }

        async function load() {
            const { data } = await _sb.from(TABLE).select('*').order('created_at', { ascending: true });
            if (data) {
                document.getElementById('timeline').innerHTML = '';
                data.forEach(m => render(m.content, m.image_url, m.created_at));
            }
        }

        async function add() {
            const input = document.getElementById('msg');
            const val = input.value.trim();
            if (!val) return;
            input.value = '';

            const { error } = await _sb.from(TABLE).insert([{ content: val }]);
            if (error) alert("DB Error: " + error.message);
            else render(val, null, new Date());
        }

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const name = `${Date.now()}-${file.name}`;
            const { error: upErr } = await _sb.storage.from('recall-photos').upload(name, file);
            if (upErr) return alert("Upload Error: " + upErr.message);

            const { data: urlData } = _sb.storage.from('recall-photos').getPublicUrl(name);
            await _sb.from(TABLE).insert([{ content: "Photo Log", image_url: urlData.publicUrl }]);
            render("Photo Log", urlData.publicUrl, new Date());
        });

        function render(c, img, t) {
            const time = new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const html = `
                <div class="flex flex-col items-end gap-1">
                    <div class="bg-blue-600 p-3 rounded-2xl rounded-br-none max-w-[85%] shadow-lg">
                        ${img ? `<img src="${img}" class="rounded-lg mb-2 border border-blue-400 shadow-sm">` : ''}
                        <p class="text-sm font-medium">${c}</p>
                    </div>
                    <span class="text-[9px] text-slate-500 font-bold uppercase mr-1">${time}</span>
                </div>`;
            document.getElementById('timeline').insertAdjacentHTML('beforeend', html);
            document.getElementById('timeline').scrollTo(0, document.getElementById('timeline').scrollHeight);
        }

        init();
    </script>
</body>

</html>
